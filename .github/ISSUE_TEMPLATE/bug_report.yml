name: Bug report
description: Tell us what broke.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Please use fake or redacted data. Report security issues privately.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: How can we reproduce it?
      description: Share the smallest example or command that shows the problem.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Erga version, operating system, and Python version.
    validations:
      required: true
